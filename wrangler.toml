name                   = "futbolfr-api"
main                   = "src/index.ts"
compatibility_date     = "2024-09-23"
compatibility_flags    = ["nodejs_compat"]
workers_dev            = true          # ← sous-domaine gratuit .workers.dev

[[kv_namespaces]]
binding = "CACHE"
id      = "39bba1934e884771bb8ec179093cf13e"

[[d1_databases]]
binding       = "DB"
database_name = "futbolfr"
database_id   = "dd349e50-cb07-422d-9e48-b98a9005bce1"

[triggers]
crons = ["*/5 * * * *"]
[observability]
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = false
# ─── SUPPRIMÉ ────────────────────────────────────────────────
# [[routes]]                         ← nécessite le domaine futbolfr.app
# pattern = "api.futbolfr.app/*"
# zone_name = "futbolfr.app"
#
# [env.production]                   ← causait le warning "Multiple environments"
# [env.dev]                          ← idem
